<script>
function scaleSlide() {
    var slide = document.getElementById('slide-container') || document.querySelector('.slide-container');
    if (!slide) return;
    var scaleX = window.innerWidth / 1280;
    var scaleY = window.innerHeight / 720;
    var scale = Math.min(scaleX, scaleY);
    slide.style.transform = 'scale(' + scale + ')';
    slide.style.transformOrigin = 'top left';
    slide.style.marginLeft = ((window.innerWidth - 1280 * scale) / 2) + 'px';
    slide.style.marginTop = ((window.innerHeight - 720 * scale) / 2) + 'px';
}
window.addEventListener('load', scaleSlide);
window.addEventListener('resize', scaleSlide);
</script>
<script id="portfolio-anim-js">
(function() {
    // ── Entry animation (staggered fadeInUp) ──────────────────────────────
    var all = Array.from(document.querySelectorAll('[data-object="true"]'));
    var contentIdx = 0;
    all.forEach(function(el) {
        var inlineOp = parseFloat(el.style.opacity);
        var isBlur = el.style.filter && el.style.filter.includes('blur');
        var isDecorative = isBlur || (!isNaN(inlineOp) && inlineOp < 0.5);
        if (isDecorative) {
            // Preserve original opacity as CSS var, then pulse
            var op = isNaN(inlineOp) ? '0.15' : String(inlineOp);
            var blur = (el.style.filter.match(/blur\(([^)]+)\)/) || ['','100px'])[1];
            el.style.setProperty('--glow-opacity', op);
            el.style.setProperty('--glow-blur', blur);
            el.style.animation = 'glowPulse ' + (3.5 + Math.random()*1.5).toFixed(1) + 's ease-in-out ' + (Math.random()*2).toFixed(1) + 's infinite';
            return;
        }
        var delay = (0.05 + contentIdx * 0.085).toFixed(2);
        el.style.opacity = '0';
        el.style.animation = 'fadeInUp 0.55s cubic-bezier(0.22,1,0.36,1) ' + delay + 's forwards';
        contentIdx++;
    });

    // ── Count-up for large KPI numbers ───────────────────────────────────
    function countUp(el, target, dec, suffix, startMs) {
        var orig = el.textContent;
        setTimeout(function() {
            var duration = 1100;
            var t0 = null;
            function step(ts) {
                if (!t0) t0 = ts;
                var p = Math.min((ts - t0) / duration, 1);
                p = 1 - Math.pow(1 - p, 3); // ease-out cubic
                var v = p * target;
                el.textContent = (dec ? v.toFixed(dec) : Math.floor(v)) + suffix;
                if (p < 1) requestAnimationFrame(step);
                else el.textContent = (dec ? target.toFixed(dec) : target) + suffix;
            }
            requestAnimationFrame(step);
        }, startMs);
    }

    document.querySelectorAll('[data-object="true"] *').forEach(function(el) {
        var fs = parseFloat(window.getComputedStyle(el).fontSize);
        if (fs < 28) return;
        // Get only the direct text node (not child element text)
        var directText = '';
        el.childNodes.forEach(function(node) {
            if (node.nodeType === 3) directText += node.textContent;
        });
        directText = directText.trim();
        var m = directText.match(/(?:^|\s)(\d+\.?\d*)$/);
        if (!m) return;
        var num = parseFloat(m[1]);
        if (num <= 0 || num > 99999) return;
        var dec = m[1].includes('.') ? m[1].split('.')[1].length : 0;
        // Find the text node to update directly
        var textNode = null;
        el.childNodes.forEach(function(node) {
            if (node.nodeType === 3 && node.textContent.trim().match(/^\d/)) textNode = node;
        });
        if (!textNode) return;
        var parent = el.closest('[data-object="true"]');
        var pd = parent ? parseFloat(parent.style.animationDelay || 0) * 1000 : 0;
        (function(tn, target, dec, startMs) {
            setTimeout(function() {
                var duration = 1100;
                var t0 = null;
                function step(ts) {
                    if (!t0) t0 = ts;
                    var p = Math.min((ts - t0) / duration, 1);
                    p = 1 - Math.pow(1 - p, 3);
                    var v = p * target;
                    tn.textContent = dec ? v.toFixed(dec) : Math.floor(v);
                    if (p < 1) requestAnimationFrame(step);
                    else tn.textContent = dec ? target.toFixed(dec) : target;
                }
                requestAnimationFrame(step);
            }, startMs);
        })(textNode, num, dec, pd + 250);
    });
})();
</script>
