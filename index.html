<p style="font-size: 12px; color: #64748B; margin: 0; letter-spacing: 0.5px;">CONFIDENTIAL - PORTFOLIO PRESENTATION</p>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const chartDom = document.getElementById('main-chart');
        const myChart = echarts.init(chartDom);
        
        const data1 = [];
        const data2 = [];
        
        for (let i = 0; i <= 100; i++) {
            const wave1 = Math.sin(i * 0.1) * 30 + Math.sin(i * 0.05) * 15 + 60;
            const noise1 = Math.random() * 4 - 2;
            data1.push([i, wave1 + noise1]);
            
            const wave2 = Math.sin(i * 0.1 - 0.5) * 15 + Math.sin(i * 0.05) * 10 + 40;
            const noise2 = Math.random() * 2 - 1;
            data2.push([i, wave2 + noise2]);
        }

        const option = {
        tooltip: { show: false },

            animation: false,
            grid: {
                top: 10,
                bottom: 10,
                left: 10,
                right: 10,
                containLabel: false
            },
            xAxis: {
                type: 'value',
                show: false,
                min: 0,
                max: 100
            },
            yAxis: {
                type: 'value',
                show: false,
                min: 0,
                max: 120
            },
            series: [
                {
                    type: 'line',
                    data: data1,
                    smooth: false,
                    showSymbol: false,
                    lineStyle: {
                        color: '#3B82F6',
                        width: 2.5
                    },
                    areaStyle: {
                        color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                            { offset: 0, color: 'rgba(59, 130, 246, 0.3)' },
                            { offset: 1, color: 'rgba(59, 130, 246, 0.0)' }
                        ])
                    }
                },
                {
                    type: 'line',
                    data: data2,
                    smooth: false,
                    showSymbol: false,
                    lineStyle: {
                        color: '#10B981',
                        width: 1.5,
                        type: 'dashed'
                    }
                }
            ]
        };

        myChart.setOption(option);
    });
</script>

<script>
function scaleSlide() {
    var slide = document.getElementById('slide-container') || document.querySelector('.slide-container');
    if (!slide) return;
    var scaleX = window.innerWidth / 1280;
    var scaleY = window.innerHeight / 720;
    var scale = Math.min(scaleX, scaleY);
    slide.style.transform = 'scale(' + scale + ')';
    slide.style.transformOrigin = 'top left';
    slide.style.marginLeft = ((window.innerWidth - 1280 * scale) / 2) + 'px';
    slide.style.marginTop = ((window.innerHeight - 720 * scale) / 2) + 'px';
}
window.addEventListener('load', scaleSlide);
window.addEventListener('resize', scaleSlide);
</script>
